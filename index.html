<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Void Survivor</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #030810;
    display: flex; flex-direction: column; align-items: center;
    justify-content: flex-start; min-height: 100vh;
    padding: 12px 0; font-family: system-ui, -apple-system, sans-serif;

  }
  #hb { width:100%; max-width:600px; display:flex; justify-content:space-between; padding:0 4px; }

  #xpb { width:100%; max-width:600px; height:3px; background:#ffffff15; border-radius:2px; }
  #xpf { height:3px; border-radius:2px; background:#44ff88; transition:width .12s; }
  #cv  { display:block; width:100%; max-width:600px; cursor:none; touch-action:none; border-radius:8px; }

</head>
<body>
<div id="hb">
  <div><div class="hl">score</div><div class="hv" id="sv">—</div></div>

  </div>
</div>
<div id="xpb"><div id="xpf" style="width:0"></div></div>
<canvas id="cv" width="600" height="600"></canvas>

<script>
// ═══════════════════════════════════════════════════════
//  VOID SURVIVOR  —  v4
//
//  Changelog v3 → v4:
//   + Pause menu (ESC) — Resume / New Game / Hangar
//   + Back button на всех overlay-экранах
//   + Плавный поворот корабля к ближайшему врагу (s.aimAng → s.ang)
//   + Стрельба только когда корабль смотрит на врага (±20°)
//   + Система сканирования: 50 энергии, -10/скан (Space/кнопка)
//   + 3 типа астероидов: poor(2)/medium(5)/rich(10) ore
//   + Механика добычи: силовой луч, ~3 сек, не прерывается в зоне
//   + Мини-карта: показывает revealed объекты с цветом по типу
//   + Ore → Credits конвертация в конце рана
//   + META.ore — накопительный ресурс
// ═══════════════════════════════════════════════════════

const CV = document.getElementById('cv');
const C  = CV.getContext('2d');
const W  = 600, H = 600;

// ── Константы ──────────────────────────────────────────
const WW  = 2400, WH = 2400;
const WSX = WW/2, WSY = WH/2;
const SPAWN_RADIUS  = 380;
const SCAN_RADIUS   = 420;   // радиус скана в мировых единицах
const SCAN_MAX      = 50;    // максимальная энергия
const SCAN_COST     = 10;    // стоимость одного скана
const SCAN_REGEN    = 3;     // единиц в секунду
const MINE_RANGE    = 75;    // дистанция начала добычи
const MINE_RANGE_SQ = MINE_RANGE * MINE_RANGE;
const MINE_CONT     = 130;   // дистанция продолжения (не прерывается)
const MINE_TIME     = 3000;  // мс на добычу
const ORE_VALUE     = { poor:2, medium:5, rich:10 };
const ORE_PER_CREDIT = 2;    // ore → credits в конце рана
const WAVE_DUR      = 30000;
const XP_BASE       = 85;
const XP_GROWTH     = 1.32;
const CREDITS_PER_SCORE = 0.04;

// Параллакс звёзды
const STAR_LAYERS = [
  { count:120, factor:0.12, rMin:0.3, rMax:0.7,  alpha:0.45 },
  { count:80,  factor:0.35, rMin:0.5, rMax:1.1,  alpha:0.65 },
  { count:40,  factor:0.70, rMin:0.8, rMax:1.6,  alpha:0.85 },
];
const STAR_DATA = STAR_LAYERS.map(layer =>
  Array.from({ length: layer.count }, () => ({
    px: Math.random(), py: Math.random(),
    r:  layer.rMin + Math.random()*(layer.rMax-layer.rMin),
    ph: Math.random()*Math.PI*2,
  }))
);
const NEBS = Array.from({ length:8 }, () => ({
  x: Math.random()*WW, y: Math.random()*WH,
  r: 140+Math.random()*160, h: 180+Math.random()*120,
}));

// ── Ships ───────────────────────────────────────────────
const SHIPS = [
  { id:'vanguard',  name:'Vanguard',  cost:0,    color:'#1d5e98', accent:'#88ccff', mhp:100, spdMul:1.00, passive:'pulseBonus', passiveDesc:'+10% Pulse damage',   statAtk:0.55, statSpd:0.55, statDef:0.55, lore:'Standard-issue interceptor' },
  { id:'bulwark',   name:'Bulwark',   cost:800,  color:'#3a3a6a', accent:'#ccccff', mhp:175, spdMul:0.72, passive:'block',      passiveDesc:'20% damage block',    statAtk:0.45, statSpd:0.30, statDef:0.92, lore:'Armored siege platform' },
  { id:'raider',    name:'Raider',    cost:600,  color:'#1a3a1a', accent:'#88ff88', mhp:65,  spdMul:1.48, passive:'dodge',      passiveDesc:'18% dodge chance',    statAtk:0.50, statSpd:0.96, statDef:0.32, lore:'Hit-and-run scout craft' },
  { id:'artillery', name:'Artillery', cost:1200, color:'#3a1a00', accent:'#ffcc66', mhp:80,  spdMul:0.85, passive:'dmgBonus',   passiveDesc:'+30% weapon damage',  statAtk:0.92, statSpd:0.40, statDef:0.45, lore:'Long-range fire support' },
  { id:'phantom',   name:'Phantom',   cost:1000, color:'#1a0a2a', accent:'#eeaaff', mhp:90,  spdMul:1.12, passive:'chainBonus', passiveDesc:'Chain Arc: +2 jumps', statAtk:0.70, statSpd:0.65, statDef:0.50, lore:'Void-phase ambush vessel' },
  { id:'sentinel',  name:'Sentinel',  cost:900,  color:'#002030', accent:'#88ffdd', mhp:95,  spdMul:1.00, passive:'freeOrb',    passiveDesc:'Orbit: +1 free orb',  statAtk:0.65, statSpd:0.50, statDef:0.55, lore:'Orbital defense specialist' },
];

const UPGRADES = [
  { k:'pulse',   name:'Pulse Cannon',  cat:'W', desc:'Energy bolts — +dmg & rate', max:5 },
  { k:'orbit',   name:'Orbit Shields', cat:'W', desc:'Rotating energy orbs',        max:4 },
  { k:'chain',   name:'Chain Arc',     cat:'W', desc:'Lightning jumps between foes',max:3 },
  { k:'scatter', name:'Scatter Shot',  cat:'W', desc:'Multi-bullet burst spread',   max:3 },
  { k:'spd',   name:'Thrusters',    cat:'P', desc:'+20% movement speed', max:4 },
  { k:'armor', name:'Hull Plating', cat:'P', desc:'+25 max HP per rank', max:4 },
  { k:'mag',   name:'Attractor',    cat:'P', desc:'Wider XP pickup radius', max:4 },
  { k:'regen', name:'Nanobots',     cat:'P', desc:'Passive HP regeneration', max:3 },
];

const ENEMY_CFG = {
  seek:  { hp:42,  spd:1.4,  pts:10, xp:8,  r:12 },
  heavy: { hp:155, spd:0.62, pts:40, xp:28, r:19 },
  fast:  { hp:24,  spd:2.55, pts:18, xp:12, r:8  },
};

// ── Утилиты ────────────────────────────────────────────
const rn   = n => Math.random()*n;
const ri   = n => Math.floor(Math.random()*n);
const d2   = (a,b) => Math.hypot(a.x-b.x, a.y-b.y);
const d2sq = (a,b) => (a.x-b.x)**2+(a.y-b.y)**2;
const a2   = (a,b) => Math.atan2(b.y-a.y, b.x-a.x);
const clamp = (v,lo,hi) => Math.max(lo,Math.min(hi,v));
const lerp  = (a,b,t) => a+(b-a)*t;

// Нормализация угла в [-π, π]
function normAng(a) {
  while (a >  Math.PI) a -= 2*Math.PI;
  while (a < -Math.PI) a += 2*Math.PI;
  return a;
}

// ── Мета-прогрессия ────────────────────────────────────
function loadMeta() {
  try { const r=localStorage.getItem('vs_meta'); if(r) return JSON.parse(r); } catch(e) {}
  return { credits:0, ore:0, owned:['vanguard'], selected:'vanguard', hi:0 };
}
function saveMeta() { try { localStorage.setItem('vs_meta',JSON.stringify(META)); } catch(e) {} }
let META = loadMeta();
if (!META.owned.includes('vanguard')) META.owned.push('vanguard');
if (!META.selected) META.selected='vanguard';
if (META.ore === undefined) META.ore = 0;
saveMeta();

// ═══════════════════════════════════════════════════════
//  ГЕНЕРАЦИЯ МИРА
// ═══════════════════════════════════════════════════════

function genAsteroidVerts(r, n=8) {
  return Array.from({ length:n }, (_,i) => {
    const a = (i/n)*Math.PI*2;
    const rr = r*(0.65+Math.random()*0.55);
    return { x:Math.cos(a)*rr, y:Math.sin(a)*rr };
  });
}

function genObstacles(wave) {
  const obs = [];
  const safeR = 200;

  function canPlace(x,y,r) {
    if (Math.hypot(x-WSX,y-WSY) < safeR+r) return false;
    for (const o of obs) if (Math.hypot(x-o.x,y-o.y)<o.r+r+30) return false;
    return true;
  }

  function tryPlace(type, attempts=40) {
    for (let a=0;a<attempts;a++) {
      const x=80+rn(WW-160), y=80+rn(WH-160);
      let r;
      if (type==='asteroid') r=22+rn(40);
      else if (type==='nebula') r=110+rn(110);
      else r=14+rn(20);
      if (!canPlace(x,y,r)) continue;
      const o = { x,y,r,tp:type };
      if (type==='asteroid') {
        // ── Три типа астероидов ──────────────────────────
        const rnd = Math.random();
        o.subtype  = rnd<0.60 ? 'poor' : rnd<0.90 ? 'medium' : 'rich';
        o.oreValue = ORE_VALUE[o.subtype];
        o.verts    = genAsteroidVerts(r, 7+ri(4));
        o.rot      = rn(Math.PI*2);
        o.rotSpd   = (rn(2)-1)*0.0004;
        o.driftAng = rn(Math.PI*2);
        o.driftSpd = rn(0.18);
        o.shade    = ri(3);
        o.revealed = false; // виден на мини-карте только после скана
      } else if (type==='nebula') {
        o.hue      = 180+ri(120);
        o.driftAng = rn(Math.PI*2);
        o.driftSpd = rn(0.06);
      } else {
        o.hp   = 40+wave*12+rn(40);
        o.mhp  = o.hp;
        o.rot  = rn(Math.PI*2);
        o.hue  = 160+ri(120);
      }
      obs.push(o); return true;
    }
    return false;
  }

  const aCount = 28+wave*2, nCount = 6+wave, cCount = 18+wave*3;
  for (let i=0;i<aCount;i++) tryPlace('asteroid');
  for (let i=0;i<nCount;i++) tryPlace('nebula');
  for (let i=0;i<cCount;i++) tryPlace('crystal');
  return obs;
}

// ═══════════════════════════════════════════════════════
//  СОСТОЯНИЕ ИГРЫ
// ═══════════════════════════════════════════════════════

let G;
let mX=W/2, mY=H/2;
let ts0=0, bR=[], hovI=-1, shopSel=META.selected;

function mkG() {
  const ship = SHIPS.find(s=>s.id===META.selected)||SHIPS[0];
  return {
    ph:     'menu',  // menu|play|pause|upgrade|shop|over
    score:  0, wave:0, lvl:1, xp:0, xpMax:XP_BASE,
    wT:0, wDur:WAVE_DUR, wBanT:0, upSrc:'levelup',
    flT:0, shT:0, shX:0, shY:0,
    parts:[], gems:[], buls:[], ens:[], orbs:[],
    spawnQ:[], sqI:0, choices:[], chainFl:null,
    obs:[], cam:{x:0,y:0},
    shipId: ship.id, earnedCredits:0,

    // ── v4 additions ────────────────────────────────────
    ore:         0,           // руда добытая за ран
    shopFrom:    'menu',      // откуда открыт магазин
    scanEnergy:  SCAN_MAX,    // текущая энергия сканирования
    scanRegen:   0,           // аккумулятор регенерации
    scanPulse:   0,           // анимация кольца скана (1→0)
    scanPulseR:  0,           // текущий радиус кольца
    revealedEns: [],          // [{x,y,tp,life}] — радарные метки врагов

    mining: null,             // {obs, t, maxT} — активная добыча

    s: {
      x:WSX, y:WSY, vx:0, vy:0,
      hp:ship.mhp, mhp:ship.mhp,
      invT:0,
      ang:    -Math.PI/2,   // текущий угол (визуальный, плавный)
      aimAng: -Math.PI/2,   // целевой угол (к ближайшему врагу)
      pT:0, oAng:0, cT:0, scT:0, rgT:0,
      passive: ship.passive, inNebula: false,
      u:{ pulse:1, orbit:0, chain:0, scatter:0, spd:0, armor:0, mag:0, regen:0 },
    },
  };
}

// ── Координаты ─────────────────────────────────────────
function wx(worldX) { return worldX-G.cam.x; }
function wy(worldY) { return worldY-G.cam.y; }
function isVis(worldX, worldY, margin=80) {
  return worldX>G.cam.x-margin && worldX<G.cam.x+W+margin &&
         worldY>G.cam.y-margin && worldY<G.cam.y+H+margin;
}

// ═══════════════════════════════════════════════════════
//  ЛОГИКА — ВСПОМОГАТЕЛЬНЫЕ
// ═══════════════════════════════════════════════════════

function ptcl(x,y,col,n,sp=2.5,sz=2) {
  for (let i=0;i<n;i++) {
    const a=rn(Math.PI*2), s=sp*0.4+rn(sp);
    G.parts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1,col,sz:0.7+rn(sz),tp:'sq'});
  }
}
function ring(x,y,col,mr=30) { G.parts.push({x,y,tp:'ring',r:2,mr,col,life:1}); }
function shk() { G.shT=210; G.shX=(rn(2)-1)*11; G.shY=(rn(2)-1)*11; }
function gem(x,y,v=10) {
  const a=rn(Math.PI*2),s=rn(2)+0.5;
  G.gems.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,val:v,r:4+v/10,life:1,ph:rn(Math.PI*2)});
}
function getDmgMul()   { return G.s.passive==='dmgBonus'?1.3:G.s.passive==='pulseBonus'?1.1:1.0; }
function getChainBonus(){ return G.s.passive==='chainBonus'?2:0; }
function getFreeOrb()  { return G.s.passive==='freeOrb'?1:0; }

// ── Скан ───────────────────────────────────────────────
function doScan() {
  if (G.scanEnergy < SCAN_COST) return;
  G.scanEnergy -= SCAN_COST;
  G.scanPulse  = 1;
  G.scanPulseR = 0;

  // Помечаем астероиды в радиусе
  const s = G.s;
  for (const o of G.obs) {
    if (o.tp==='asteroid' && d2(s,o)<SCAN_RADIUS) {
      o.revealed = true;
    }
  }

  // Радарные метки врагов (исчезают через 8 сек)
  G.revealedEns = G.ens
    .filter(e=>d2(s,e)<SCAN_RADIUS)
    .map(e=>({x:e.x,y:e.y,tp:e.tp,life:1}));
}

// ── Волны ──────────────────────────────────────────────
function spawnWave(w) {
  G.ens=[]; G.buls=[]; G.gems=[]; G.orbs=[];
  G.spawnQ=[]; G.sqI=0; G.wT=0;
  G.mining=null; G.revealedEns=[]; G.scanPulse=0; G.scanPulseR=0;
  G.obs = genObstacles(w);
  G.s.x=WSX; G.s.y=WSY; G.s.vx=0; G.s.vy=0;
  G.cam.x=WSX-W/2; G.cam.y=WSY-H/2;
  const n=8+w*5;
  for (let i=0;i<n;i++) {
    const t=rn(G.wDur*0.75), rr=Math.random();
    let tp;
    if      (w<=1) tp='seek';
    else if (w<=2) tp=rr<0.28?'heavy':'seek';
    else if (w<=4) tp=rr<0.22?'heavy':rr<0.48?'fast':'seek';
    else           tp=rr<0.28?'heavy':rr<0.52?'fast':'seek';
    G.spawnQ.push({t,tp});
  }
  G.spawnQ.sort((a,b)=>a.t-b.t);
}

function spawnEn(tp) {
  const a=rn(Math.PI*2), d=SPAWN_RADIUS+rn(120);
  const x=clamp(G.s.x+Math.cos(a)*d, 60, WW-60);
  const y=clamp(G.s.y+Math.sin(a)*d, 60, WH-60);
  const cc=ENEMY_CFG[tp];
  G.ens.push({x,y,vx:0,vy:0,tp,...cc,mhp:cc.hp,invT:0,ph:rn(Math.PI*2)});
}

function killEn(i) {
  if (i<0||i>=G.ens.length) return;
  const e=G.ens[i];
  const col={seek:'#ee4444',heavy:'#ff8800',fast:'#cc44ff'}[e.tp];
  ptcl(e.x,e.y,col,13,4,3.5); ring(e.x,e.y,col,e.r*2.6);
  const gc=1+Math.floor(e.xp/10);
  for (let j=0;j<gc;j++) gem(e.x+rn(16)-8,e.y+rn(16)-8,Math.ceil(e.xp/gc));
  G.score+=e.pts; updHUD(); G.ens.splice(i,1);
}

// ── Апгрейды ───────────────────────────────────────────
function getChoices() {
  return [...UPGRADES.filter(u=>G.s.u[u.k]<u.max)].sort(()=>Math.random()-0.5).slice(0,3);
}
function tryUpgrade(upSrc) {
  const ch=getChoices();
  if (ch.length===0) {
    if (upSrc==='wavecomplete') { G.wave++; spawnWave(G.wave); G.wBanT=2400; }
    G.ph='play'; updHUD(); return;
  }
  G.upSrc=upSrc; G.choices=ch; G.ph='upgrade'; hovI=-1;
}
function applyUpg(k) {
  G.s.u[k]++;
  if (k==='armor') { G.s.mhp+=25; G.s.hp=Math.min(G.s.mhp,G.s.hp+15); }
  ptcl(G.s.x,G.s.y,'#44ff88',18,5,3); ring(G.s.x,G.s.y,'#44ff88',45);
  if (G.upSrc==='wavecomplete') { G.wave++; spawnWave(G.wave); G.wBanT=2400; }
  G.ph='play'; updHUD();
}

// ═══════════════════════════════════════════════════════
//  ЛОГИКА — UPDATE
// ═══════════════════════════════════════════════════════

function update(dt) {
  if (G.ph!=='play') return;

  G.flT=Math.max(0,G.flT-dt); G.shT=Math.max(0,G.shT-dt);
  if (G.shT<=0) { G.shX=0; G.shY=0; }
  G.wT+=dt; G.wBanT=Math.max(0,G.wBanT-dt);
  if (G.chainFl) { G.chainFl.life-=dt/280; if(G.chainFl.life<=0) G.chainFl=null; }

  // Скан пульс — анимация кольца
  if (G.scanPulse>0) {
    G.scanPulse=Math.max(0,G.scanPulse-dt/700);
    G.scanPulseR=SCAN_RADIUS*(1-G.scanPulse);
  }

  // Регенерация энергии скана
  G.scanRegen+=dt;
  if (G.scanRegen>=1000/SCAN_REGEN) {
    G.scanEnergy=Math.min(SCAN_MAX,G.scanEnergy+1);
    G.scanRegen=0;
  }

  // Радарные метки врагов — затухание
  G.revealedEns.forEach(e=>e.life-=dt/8000);
  G.revealedEns=G.revealedEns.filter(e=>e.life>0);

  while (G.sqI<G.spawnQ.length && G.spawnQ[G.sqI].t<=G.wT) {
    spawnEn(G.spawnQ[G.sqI].tp); G.sqI++;
  }
  if (G.wT>=G.wDur && G.ens.length===0 && G.sqI>=G.spawnQ.length) {
    G.score+=G.wave*250; updHUD(); tryUpgrade('wavecomplete'); return;
  }

  // Препятствия: дрейф
  for (const o of G.obs) {
    if (o.tp==='asteroid'||o.tp==='nebula') {
      o.x+=Math.cos(o.driftAng)*o.driftSpd;
      o.y+=Math.sin(o.driftAng)*o.driftSpd;
      o.x=clamp(o.x,o.r,WW-o.r); o.y=clamp(o.y,o.r,WH-o.r);
    }
    if (o.tp==='asteroid') o.rot+=o.rotSpd*dt;
  }

  // ── Движение игрока ────────────────────────────────
  const ship=SHIPS.find(s=>s.id===G.shipId)||SHIPS[0];
  const s=G.s;

  s.inNebula=false;
  for (const o of G.obs) if(o.tp==='nebula'&&d2(s,o)<o.r*0.85){s.inNebula=true;break;}

  const nebulaSlowMul=s.inNebula?0.48:1.0;
  const spd=2.7*ship.spdMul*(1+0.22*s.u.spd)*nebulaSlowMul;

  const worldMX=mX+G.cam.x, worldMY=mY+G.cam.y;
  const dx=worldMX-s.x, dy=worldMY-s.y, md=Math.hypot(dx,dy);
  if (md>5) { s.vx+=(dx/md)*spd*0.15; s.vy+=(dy/md)*spd*0.15; }
  s.vx*=0.83; s.vy*=0.83;

  let nx=s.x+s.vx, ny=s.y+s.vy;
  nx=clamp(nx,20,WW-20); ny=clamp(ny,20,WH-20);

  for (const o of G.obs) {
    if (o.tp==='nebula') continue;
    const dd=Math.hypot(nx-o.x,ny-o.y), minD=o.r+16;
    if (dd<minD) {
      const ang=Math.atan2(ny-o.y,nx-o.x);
      nx=o.x+Math.cos(ang)*minD; ny=o.y+Math.sin(ang)*minD;
      s.vx*=0.3; s.vy*=0.3;
      if (s.invT<=0) {
        const dmgIn=o.tp==='asteroid'?10:7;
        let actual=dmgIn;
        if (s.passive==='block'&&Math.random()<0.20) actual=0;
        if (s.passive==='dodge'&&Math.random()<0.18) actual=0;
        if (actual>0) { s.hp=Math.max(0,s.hp-actual); shk(); G.flT=320; updHUD(); }
        s.invT=600;
        if (s.hp<=0) { endRun(); return; }
      }
    }
  }
  s.x=nx; s.y=ny;

  // Камера
  const tCamX=clamp(s.x-W/2,0,WW-W), tCamY=clamp(s.y-H/2,0,WH-H);
  G.cam.x=lerp(G.cam.x,tCamX,0.09); G.cam.y=lerp(G.cam.y,tCamY,0.09);

  // ── Видимые враги ──────────────────────────────────
  const visEns=G.ens.filter(e=>isVis(e.x,e.y,e.r));
  const near=visEns.reduce((b,e)=>(!b||d2(s,e)<d2(s,b))?e:b, null);

  // ── Плавный поворот корабля ─────────────────────────
  // Корабль ВСЕГДА развёрнут к ближайшему видимому врагу
  if (near) {
    s.aimAng = a2(s, near);
  }
  // Lerp текущего угла к целевому
  const angDiff = normAng(s.aimAng - s.ang);
  s.ang += angDiff * Math.min(1, dt*0.005); // ~165°/сек

  // Стрелять только когда смотрим примерно на цель (±20°)
  const facingTarget = near && Math.abs(angDiff) < 0.35;

  s.invT=Math.max(0,s.invT-dt);

  // Engine trail
  if (Math.hypot(s.vx,s.vy)>0.4) {
    const ta=s.ang+Math.PI, px=s.x+Math.cos(ta)*16, py=s.y+Math.sin(ta)*16;
    if (Math.random()<0.55)
      G.parts.push({x:px+(rn(5)-2.5),y:py+(rn(5)-2.5),
        vx:Math.cos(ta)*0.9,vy:Math.sin(ta)*0.9,
        life:0.45+rn(0.3),col:Math.random()<0.4?'#ffcc44':'#ff8822',sz:1.2+rn(2.2),tp:'sq'});
  }

  if (s.u.regen>0) {
    s.rgT+=dt; const rt=[2500,1600,1000][s.u.regen-1];
    if (s.rgT>=rt) { s.hp=Math.min(s.mhp,s.hp+1); s.rgT=0; updHUD(); }
  }

  // ── Добыча (Mining) ────────────────────────────────
  updateMining(dt);

  const dm=getDmgMul();

  // ── Оружия (только когда смотрим на цель) ──────────

  // 1. Pulse Cannon
  s.pT=Math.max(0,s.pT-dt);
  if (s.pT<=0 && facingTarget) {
    s.pT=Math.max(155,520-s.u.pulse*68);
    const dmg=(15+s.u.pulse*9)*dm, shots=1+Math.floor(s.u.pulse/3);
    for (let i=0;i<shots;i++) {
      const da=(i-(shots-1)/2)*0.2, ba=a2(s,near)+da;
      G.buls.push({x:s.x,y:s.y,vx:Math.cos(ba)*10,vy:Math.sin(ba)*10,dmg,life:1,tp:'pulse',r:5});
    }
  }

  // 2. Orbit Shields
  s.oAng+=dt*0.0025;
  if (s.u.orbit>0) {
    const cnt=s.u.orbit+1+getFreeOrb();
    G.orbs=Array.from({length:cnt},(_,i)=>{
      const oa=s.oAng+(i/cnt)*Math.PI*2;
      return {x:s.x+Math.cos(oa)*58,y:s.y+Math.sin(oa)*58,r:8+s.u.orbit*2.5};
    });
    for (const orb of G.orbs)
      for (let j=G.ens.length-1;j>=0;j--) {
        const ej=G.ens[j];
        if (!isVis(ej.x,ej.y,ej.r)) continue;
        if (d2(orb,ej)<orb.r+ej.r) {
          ej.hp-=(5+s.u.orbit*3.5)*dm*dt/100;
          ptcl(orb.x,orb.y,'#55aaff',1,1.5,1.5);
          if (ej.hp<=0) killEn(j);
        }
      }
  } else G.orbs=[];

  // 3. Chain Arc (только видимые, только когда facingTarget)
  s.cT=Math.max(0,s.cT-dt);
  if (s.u.chain>0 && s.cT<=0 && facingTarget && visEns.length>0) {
    s.cT=820-s.u.chain*155;
    const targets=[...visEns].sort((a,b)=>d2(s,a)-d2(s,b)).slice(0,1+s.u.chain*2+getChainBonus());
    const segs=[{x:s.x,y:s.y}];
    targets.forEach(e=>{
      e.hp-=(22+s.u.chain*14)*dm; ptcl(e.x,e.y,'#aaccff',6,3,2); segs.push({x:e.x,y:e.y});
      if (e.hp<=0){const idx=G.ens.indexOf(e);if(idx>=0)killEn(idx);}
    });
    G.chainFl={segs,life:1};
  }

  // 4. Scatter Shot
  s.scT=Math.max(0,s.scT-dt);
  if (s.u.scatter>0 && s.scT<=0 && facingTarget) {
    s.scT=700-s.u.scatter*105;
    const cnt=3+s.u.scatter*2, ba=a2(s,near);
    for (let i=0;i<cnt;i++) {
      const sa=ba+(i-(cnt-1)/2)*0.22;
      G.buls.push({x:s.x,y:s.y,vx:Math.cos(sa)*7.5,vy:Math.sin(sa)*7.5,dmg:(8+s.u.scatter*5)*dm,life:0.8,tp:'scatter',r:3.5});
    }
  }

  // ── Пули ────────────────────────────────────────────
  for (let i=G.buls.length-1;i>=0;i--) {
    const b=G.buls[i]; b.x+=b.vx; b.y+=b.vy;
    b.life-=dt/(b.tp==='pulse'?1100:850);
    if (b.life<=0||b.x<0||b.x>WW||b.y<0||b.y>WH){G.buls.splice(i,1);continue;}
    let blocked=false;
    for (let oi=G.obs.length-1;oi>=0;oi--) {
      const o=G.obs[oi];
      if (o.tp==='nebula') continue;
      if (d2(b,o)<o.r) {
        ptcl(b.x,b.y,'#aaaaaa',3,1.5,2); blocked=true;
        if (o.tp==='crystal') {
          o.hp-=b.dmg; ptcl(o.x,o.y,'#88ccff',4,2,2);
          if (o.hp<=0) {
            ptcl(o.x,o.y,'#88ffcc',16,4,3.5); ring(o.x,o.y,'#44ccff',o.r*2.2);
            const gc=3+ri(5);
            for (let gi=0;gi<gc;gi++) gem(o.x+rn(30)-15,o.y+rn(30)-15,10+ri(15));
            G.score+=25; updHUD(); G.obs.splice(oi,1);
          }
        }
        break;
      }
    }
    if (blocked){G.buls.splice(i,1);continue;}
    let hit=false;
    for (let j=G.ens.length-1;j>=0;j--) {
      if (d2(b,G.ens[j])<b.r+G.ens[j].r) {
        G.ens[j].hp-=b.dmg; ptcl(b.x,b.y,b.tp==='pulse'?'#55aaff':'#ffaa33',5,2,2);
        hit=true; if(G.ens[j].hp<=0)killEn(j); break;
      }
    }
    if (hit) G.buls.splice(i,1);
  }

  // ── Враги ────────────────────────────────────────────
  for (let i=G.ens.length-1;i>=0;i--) {
    const e=G.ens[i]; e.ph+=dt*0.002; e.invT=Math.max(0,e.invT-dt);
    let eSlow=1.0;
    for (const o of G.obs) if(o.tp==='nebula'&&d2(e,o)<o.r*0.85){eSlow=0.45;break;}
    const ea=a2(e,s); e.x+=Math.cos(ea)*e.spd*eSlow; e.y+=Math.sin(ea)*e.spd*eSlow;
    for (const o of G.obs) {
      if (o.tp==='nebula') continue;
      const od=d2(e,o);
      if (od<o.r+e.r+4){const oa=Math.atan2(e.y-o.y,e.x-o.x);e.x=o.x+Math.cos(oa)*(o.r+e.r+4);e.y=o.y+Math.sin(oa)*(o.r+e.r+4);}
    }
    if (d2(e,s)<e.r+17&&s.invT<=0) {
      let dmgIn={seek:12,heavy:20,fast:8}[e.tp];
      if (s.passive==='block'&&Math.random()<0.20) dmgIn=0;
      if (s.passive==='dodge'&&Math.random()<0.18){s.invT=900;continue;}
      s.hp=Math.max(0,s.hp-dmgIn); s.invT=900;
      if (dmgIn>0){shk();G.flT=420;ptcl(s.x,s.y,'#ff3344',15,3.5,3);ring(s.x,s.y,'#ff5566',26);}
      updHUD();
      if (s.hp<=0){endRun();return;}
    }
    if (d2(e,s)>900) G.ens.splice(i,1);
  }

  // ── XP Gems ──────────────────────────────────────────
  const magR=80+s.u.mag*32;
  for (let i=G.gems.length-1;i>=0;i--) {
    const g=G.gems[i]; g.life-=dt/18000; g.ph+=dt*0.003;
    if (g.life<=0){G.gems.splice(i,1);continue;}
    const gd=d2(g,s);
    if (gd<magR){const ga=a2(g,s),sp=Math.max(3,(magR-gd)/9);g.vx+=Math.cos(ga)*sp*0.2;g.vy+=Math.sin(ga)*sp*0.2;}
    g.vx*=0.88;g.vy*=0.88;g.x+=g.vx;g.y+=g.vy;
    g.x=clamp(g.x,0,WW);g.y=clamp(g.y,0,WH);
    if (gd<22) {
      G.xp+=g.val;G.score+=1;G.gems.splice(i,1);
      while (G.xp>=G.xpMax){
        G.xp-=G.xpMax;G.xpMax=Math.round(G.xpMax*XP_GROWTH);G.lvl++;
        ptcl(s.x,s.y,'#44ff88',22,5,3);ring(s.x,s.y,'#44ff88',42);
        tryUpgrade('levelup');if(G.ph!=='play')return;
      }
      updHUD();
    }
  }

  // Частицы
  for (let i=G.parts.length-1;i>=0;i--) {
    const p=G.parts[i];
    if (p.tp==='ring'){p.r+=88*dt/1000;p.life-=dt/420;}
    else{p.x+=p.vx;p.y+=p.vy;p.life-=dt/780;p.vx*=0.91;p.vy*=0.91;}
    if (p.life<=0)G.parts.splice(i,1);
  }
}

// ═══════════════════════════════════════════════════════
//  ЛОГИКА — ДОБЫЧА
// ═══════════════════════════════════════════════════════

function updateMining(dt) {
  const s=G.s;

  // Если активна добыча — проверяем дистанцию
  if (G.mining) {
    const o=G.mining.obs;
    // Проверяем что астероид ещё существует
    if (!G.obs.includes(o)) { G.mining=null; return; }
    const dist=d2sq(s,o);

    if (dist < MINE_CONT*MINE_CONT) {
      // Продолжаем добычу
      G.mining.t += dt;
      if (G.mining.t >= G.mining.maxT) {
        // Добыча завершена!
        const oreGain = o.oreValue || 2;
        G.ore += oreGain;
        ptcl(o.x,o.y,'#44ffaa',20,4,3.5);
        ring(o.x,o.y,'#44ffaa',o.r*2.5);
        ptcl(o.x,o.y,'#ffcc44',8,2.5,2);
        // Удаляем астероид
        const idx=G.obs.indexOf(o);
        if (idx>=0) G.obs.splice(idx,1);
        G.mining=null;
        updHUD();
      }
    } else {
      // Вышли из зоны — прерываем
      G.mining=null;
    }
    return;
  }

  // Нет активной добычи — ищем ближайший астероид в диапазоне
  for (const o of G.obs) {
    if (o.tp!=='asteroid') continue;
    if (d2sq(s,o) < MINE_RANGE_SQ) {
      // Начинаем добычу
      G.mining = { obs:o, t:0, maxT:MINE_TIME };
      return;
    }
  }
}

function endRun() {
  const credFromScore = Math.floor(G.score*CREDITS_PER_SCORE);
  const credFromOre   = Math.floor(G.ore*ORE_PER_CREDIT);
  const earned        = credFromScore+credFromOre;
  META.credits += earned;
  META.ore     += G.ore;
  if (G.score>META.hi) META.hi=G.score;
  saveMeta();
  G.earnedCredits=earned;
  G.ph='over';
}

//  РЕНДЕР — ВСПОМОГАТЕЛЬНЫЕ

function rRect(x,y,w,h,r) {
  C.beginPath();C.moveTo(x+r,y);C.lineTo(x+w-r,y);C.quadraticCurveTo(x+w,y,x+w,y+r);
  C.lineTo(x+w,y+h-r);C.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  C.lineTo(x+r,y+h);C.quadraticCurveTo(x,y+h,x,y+h-r);
  C.lineTo(x,y+r);C.quadraticCurveTo(x,y,x+r,y);C.closePath();
}

function drawBGPlay(t) {
  C.fillStyle='#030810';C.fillRect(0,0,W,H);
  const nebFactor=0.6;
  NEBS.forEach(n=>{
    const sx=((n.x-G.cam.x*nebFactor)%WW+WW)%WW-WW/2;
    const sy=((n.y-G.cam.y*nebFactor)%WH+WH)%WH-WH/2;
    C.fillStyle=`hsla(${n.h},55%,22%,0.08)`;C.beginPath();C.arc(sx,sy,n.r,0,Math.PI*2);C.fill();
    C.fillStyle=`hsla(${n.h},55%,38%,0.05)`;C.beginPath();C.arc(sx,sy,n.r*0.55,0,Math.PI*2);C.fill();
  });
  STAR_LAYERS.forEach((layer,li)=>{
    STAR_DATA[li].forEach(s=>{
      const sx=((s.px*W-G.cam.x*layer.factor)%W+W)%W;
      const sy=((s.py*H-G.cam.y*layer.factor)%H+H)%H;
      C.globalAlpha=layer.alpha*(0.5+0.5*Math.sin(s.ph+t*0.0009));
      C.fillStyle='#fff';C.beginPath();C.arc(sx,sy,s.r,0,Math.PI*2);C.fill();
    });
  });
  C.globalAlpha=1;
}

function drawBGStatic(t) {
  C.fillStyle='#030810';C.fillRect(0,0,W,H);
  NEBS.slice(0,5).forEach(n=>{
    C.fillStyle=`hsla(${n.h},55%,22%,0.08)`;C.beginPath();C.arc(n.x*W/WW,n.y*H/WH,n.r*W/WW,0,Math.PI*2);C.fill();
  });
  STAR_DATA[0].forEach(s=>{
    C.globalAlpha=0.2+0.5*(0.5+0.5*Math.sin(s.ph+t*0.0007));
    C.fillStyle='#fff';C.beginPath();C.arc(s.px*W,s.py*H,s.r,0,Math.PI*2);C.fill();
  });
  C.globalAlpha=1;
}

// ═══════════════════════════════════════════════════════
//  РЕНДЕР — ПРЕПЯТСТВИЯ
// ═══════════════════════════════════════════════════════

function drawObstacles(t) {
  for (const o of G.obs) {
    if (!isVis(o.x,o.y,o.r+20)) continue;
    const sx=wx(o.x),sy=wy(o.y);
    if (o.tp==='asteroid') {
      C.save();C.translate(sx,sy);C.rotate(o.rot);
      const shades=[['#1a1a24','#2a2a38','#3a3a50'],['#1c1810','#2e2618','#403620'],['#141c10','#20300c','#304420']];
      const sh=shades[o.shade||0];
      C.globalAlpha=0.07;C.fillStyle=sh[2];C.beginPath();
      o.verts.forEach((v,i)=>i?C.lineTo(v.x*1.25,v.y*1.25):C.moveTo(v.x*1.25,v.y*1.25));
      C.closePath();C.fill();C.globalAlpha=1;
      C.fillStyle=sh[0];C.beginPath();
      o.verts.forEach((v,i)=>i?C.lineTo(v.x,v.y):C.moveTo(v.x,v.y));
      C.closePath();C.fill();
      C.fillStyle=sh[1];C.beginPath();
      o.verts.forEach((v,i)=>i?C.lineTo(v.x*0.78,v.y*0.78):C.moveTo(v.x*0.78,v.y*0.78));
      C.closePath();C.fill();
      C.fillStyle=sh[2];C.beginPath();
      o.verts.forEach((v,i)=>i?C.lineTo(v.x*0.4+1,v.y*0.4-1):C.moveTo(v.x*0.4+1,v.y*0.4-1));
      C.closePath();C.fill();
      C.strokeStyle=sh[0];C.lineWidth=0.8;
      C.beginPath();C.moveTo(-o.r*0.25,-o.r*0.2);C.lineTo(o.r*0.1,o.r*0.18);C.lineTo(-o.r*0.05,o.r*0.3);C.stroke();
      C.beginPath();C.moveTo(o.r*0.15,-o.r*0.3);C.lineTo(o.r*0.28,o.r*0.06);C.stroke();
      C.strokeStyle=sh[2]+'55';C.lineWidth=1;C.beginPath();
      o.verts.forEach((v,i)=>i?C.lineTo(v.x,v.y):C.moveTo(v.x,v.y));C.closePath();C.stroke();

      // Цветной ореол по типу (виден в игре)
      const oreColor={poor:'#888899',medium:'#ffaa44',rich:'#44ffaa'}[o.subtype];
      C.globalAlpha=0.18;C.strokeStyle=oreColor;C.lineWidth=1.5;
      C.beginPath();C.arc(0,0,o.r*1.1,0,Math.PI*2);C.stroke();
      C.globalAlpha=1;

      // Иконка типа (маленький значок)
      const iconCol={poor:'#888899',medium:'#ffaa44',rich:'#44ffaa'}[o.subtype];
      C.fillStyle=iconCol;C.font=`${Math.max(8,o.r*0.35)}px system-ui`;
      C.textAlign='center';C.textBaseline='middle';
      C.fillText({poor:'◆',medium:'◆',rich:'◆'}[o.subtype]||'◆',0,0);

      // Mining активен — пульсирующий ореол
      if (G.mining&&G.mining.obs===o) {
        const prog=G.mining.t/G.mining.maxT;
        C.globalAlpha=0.25+0.15*Math.sin(t*0.012);C.strokeStyle='#44ffaa';C.lineWidth=2.5;
        C.beginPath();C.arc(0,0,o.r*1.25,0,Math.PI*2);C.stroke();
        // Прогресс-дуга
        C.globalAlpha=0.9;C.strokeStyle='#44ffaa';C.lineWidth=3;
        C.beginPath();C.arc(0,0,o.r+10,-Math.PI/2,-Math.PI/2+Math.PI*2*prog);C.stroke();
        C.globalAlpha=1;
      }

      // В радиусе добычи (но не добываем)
      else if (!G.mining && d2sq(G.s,o)<MINE_RANGE_SQ) {
        C.globalAlpha=0.12+0.06*Math.sin(t*0.006);C.strokeStyle='#44ffaa';C.lineWidth=1.5;
        C.beginPath();C.arc(0,0,o.r*1.2,0,Math.PI*2);C.stroke();C.globalAlpha=1;
      }
      C.restore();

    } else if (o.tp==='nebula') {
      C.save();C.translate(sx,sy);
      C.globalAlpha=0.05;C.fillStyle=`hsl(${o.hue},60%,35%)`;C.beginPath();C.arc(0,0,o.r,0,Math.PI*2);C.fill();
      C.globalAlpha=0.08;C.fillStyle=`hsl(${o.hue},55%,45%)`;C.beginPath();C.ellipse(-o.r*0.12,o.r*0.08,o.r*0.7,o.r*0.62,0.4,0,Math.PI*2);C.fill();
      C.globalAlpha=0.12;C.strokeStyle=`hsl(${o.hue},50%,55%)`;C.lineWidth=2;C.setLineDash([8,12]);
      C.beginPath();C.arc(0,0,o.r*0.9,0,Math.PI*2);C.stroke();C.setLineDash([]);
      if (d2(G.s,o)<o.r){C.globalAlpha=0.18+0.08*Math.sin(t*0.005);C.strokeStyle=`hsl(${o.hue},70%,65%)`;C.lineWidth=2;C.beginPath();C.arc(0,0,o.r*0.88,0,Math.PI*2);C.stroke();}
      C.globalAlpha=1;C.restore();

    } else { // crystal
      C.save();C.translate(sx,sy);C.rotate(o.rot+t*0.0005);
      const hp_pct=o.hp/o.mhp,h=o.hue,r=o.r;
      C.globalAlpha=0.1*hp_pct;C.fillStyle=`hsl(${h},70%,60%)`;C.beginPath();C.arc(0,0,r+8,0,Math.PI*2);C.fill();
      C.globalAlpha=hp_pct;
      C.fillStyle=`hsl(${h},55%,15%)`;C.beginPath();for(let i=0;i<6;i++){const a=i*Math.PI/3-Math.PI/6;i?C.lineTo(Math.cos(a)*r,Math.sin(a)*r):C.moveTo(Math.cos(a)*r,Math.sin(a)*r);}C.closePath();C.fill();
      C.fillStyle=`hsl(${h},60%,28%)`;C.beginPath();for(let i=0;i<6;i++){const a=i*Math.PI/3-Math.PI/6,rr=r*0.72;i?C.lineTo(Math.cos(a)*rr,Math.sin(a)*rr):C.moveTo(Math.cos(a)*rr,Math.sin(a)*rr);}C.closePath();C.fill();
      C.fillStyle=`hsl(${h},65%,42%)`;C.beginPath();for(let i=0;i<6;i++){const a=i*Math.PI/3-Math.PI/6,rr=r*0.42;i?C.lineTo(Math.cos(a)*rr,Math.sin(a)*rr):C.moveTo(Math.cos(a)*rr,Math.sin(a)*rr);}C.closePath();C.fill();
      C.fillStyle=`hsl(${h},80%,65%)`;C.beginPath();C.arc(0,0,r*0.2,0,Math.PI*2);C.fill();

// ─── Mining beam ───────────────────────────────────────
function drawMiningBeam(t) {
  if (!G.mining) return;
  const o=G.mining.obs;
  if (!G.obs.includes(o)) return;
  const sx=wx(G.s.x), sy=wy(G.s.y);
  const ex=wx(o.x), ey=wy(o.y);

  // Силовой луч
  const flicker=0.7+0.3*Math.sin(t*0.025);
  C.save();
  C.strokeStyle=`rgba(68,255,170,${0.5*flicker})`;C.lineWidth=3;
  C.shadowColor='#44ffaa';C.shadowBlur=8;
  C.setLineDash([8,4]);C.beginPath();C.moveTo(sx,sy);C.lineTo(ex,ey);C.stroke();
  C.setLineDash([]);
  C.strokeStyle=`rgba(180,255,230,${0.3*flicker})`;C.lineWidth=1;
  C.beginPath();C.moveTo(sx,sy);C.lineTo(ex,ey);C.stroke();
  C.shadowBlur=0;

  // Частицы вдоль луча
  if (Math.random()<0.25) {
    const prog=Math.random();
    ptcl(G.s.x+(o.x-G.s.x)*prog+(rn(6)-3), G.s.y+(o.y-G.s.y)*prog+(rn(6)-3), '#44ffaa',1,1,1.5);
  }

  // Ore label
  const oreColor={poor:'#888899',medium:'#ffaa44',rich:'#44ffaa'}[o.subtype]||'#44ffaa';
  const prog=G.mining.t/G.mining.maxT;
  C.font='10px system-ui,sans-serif';C.fillStyle=oreColor;C.textAlign='center';C.textBaseline='bottom';
  const lx=wx(o.x),ly=wy(o.y)-o.r-16;
  C.fillText(`+${o.oreValue} ore`,lx,ly);
  C.restore();
}

// ─── Scan pulse ────────────────────────────────────────
function drawScanPulse() {
  if (G.scanPulse<=0) return;
  C.save();
  C.globalAlpha=G.scanPulse*0.35;
  C.strokeStyle='#44aaff';C.lineWidth=2;
  C.beginPath();C.arc(wx(G.s.x),wy(G.s.y),G.scanPulseR,0,Math.PI*2);C.stroke();
  C.globalAlpha=G.scanPulse*0.06;
  C.fillStyle='#44aaff';C.beginPath();C.arc(wx(G.s.x),wy(G.s.y),G.scanPulseR,0,Math.PI*2);C.fill();
  C.globalAlpha=1;C.restore();
}

// ─── Scan UI ───────────────────────────────────────────
function drawScanUI() {
  const pips=SCAN_MAX/SCAN_COST; // 5
  const filled=Math.floor(G.scanEnergy/SCAN_COST);
  const canScan=G.scanEnergy>=SCAN_COST;
  const bx=W-130, by=8, bw=122, bh=22;

  // Фон
  rRect(bx-2,by-2,bw+4,bh+4,4);
  C.fillStyle='rgba(3,8,16,0.7)';C.fill();

  // Кнопка-лейбл
  C.font='9px system-ui,sans-serif';
  C.fillStyle=canScan?'#44aaff':'#224466';
  C.textAlign='left';C.textBaseline='middle';
  C.fillText('SCAN',bx+4,by+bh/2);

  // Пипки энергии
  for (let i=0;i<pips;i++) {
    const full=i<filled;
    const px=bx+42+i*15;
    rRect(px,by+5,12,10,2);
    C.fillStyle=full?'#44aaff':'#0a1828';C.fill();
    if (full){C.fillStyle='rgba(100,200,255,0.3)';C.fill();}
  }

  // Кнопка для клика
  bR.push({x:bx-2,y:by-2,w:bw+4,h:bh+4,act:'scan'});
}

// ─── Мини-карта ────────────────────────────────────────
function drawMinimap() {
  const mx=W-106, my=H-106, mw=96, mh=96;
  const sx=WW/mw, sy=WH/mh;

  rRect(mx-2,my-2,mw+4,mh+4,4);
  C.fillStyle='rgba(3,8,16,0.75)';C.fill();
  C.strokeStyle='#ffffff12';C.lineWidth=0.5;C.stroke();

  // Viewport
  C.strokeStyle='#ffffff18';C.lineWidth=0.8;
  C.strokeRect(mx+G.cam.x/sx,my+G.cam.y/sy,W/sx,H/sy);

  // Revealed туманности
  for (const o of G.obs) {
    if (o.tp!=='nebula') continue;
    C.globalAlpha=0.25;C.fillStyle=`hsl(${o.hue},50%,35%)`;
    C.beginPath();C.arc(mx+o.x/sx,my+o.y/sy,o.r/sx,0,Math.PI*2);C.fill();
  }
  C.globalAlpha=1;

  // Revealed астероиды — с цветом по типу
  const asteroidColors={poor:'#888899',medium:'#ffaa44',rich:'#44ffaa'};
  for (const o of G.obs) {
    if (o.tp!=='asteroid'||!o.revealed) continue;
    C.fillStyle=asteroidColors[o.subtype]||'#888899';
    C.globalAlpha=0.7;
    C.beginPath();C.arc(mx+o.x/sx,my+o.y/sy,Math.max(1.5,o.r/sx),0,Math.PI*2);C.fill();
    C.globalAlpha=1;
  }

  // Кристаллы (всегда видны)
  for (const o of G.obs) {
    if (o.tp!=='crystal') continue;
    C.fillStyle=`hsl(${o.hue},60%,50%)`;C.globalAlpha=0.55;
    C.beginPath();C.arc(mx+o.x/sx,my+o.y/sy,Math.max(1,o.r/sx),0,Math.PI*2);C.fill();
    C.globalAlpha=1;
  }

  // Radar-метки врагов (из скана, затухают)
  const enColors={seek:'#ee4444',heavy:'#ff8800',fast:'#cc44ff'};
  G.revealedEns.forEach(e=>{
    C.globalAlpha=e.life*0.8;
    C.fillStyle=enColors[e.tp]||'#ff4444';
    C.beginPath();C.arc(mx+e.x/sx,my+e.y/sy,2.5,0,Math.PI*2);C.fill();
  });
  C.globalAlpha=1;

  // Враги в viewport (всегда)
  for (const e of G.ens) {
    if (!isVis(e.x,e.y,e.r)) continue;
    C.fillStyle=enColors[e.tp]||'#ff4444';
    C.beginPath();C.arc(mx+e.x/sx,my+e.y/sy,2,0,Math.PI*2);C.fill();
  }

  // Gems
  C.fillStyle='#44ff88';
  for (const g of G.gems) {C.beginPath();C.arc(mx+g.x/sx,my+g.y/sy,1,0,Math.PI*2);C.fill();}

  // Добываемый астероид — мигает
  if (G.mining&&G.obs.includes(G.mining.obs)) {
    const o=G.mining.obs;
    C.fillStyle='#44ffaa';C.globalAlpha=0.9+0.1*Math.sin(Date.now()*0.01);
    C.beginPath();C.arc(mx+o.x/sx,my+o.y/sy,3,0,Math.PI*2);C.fill();
    C.globalAlpha=1;
  }

  // Игрок
  C.fillStyle='#fff';C.beginPath();C.arc(mx+G.s.x/sx,my+G.s.y/sy,2.5,0,Math.PI*2);C.fill();

  // Граница карты
  C.strokeStyle='#ffffff15';C.lineWidth=0.5;rRect(mx,my,mw,mh,3);C.stroke();
}

  const hw=185,hh=40,hx=W/2-hw/2,hy=py+ph2+12;
  const hhv=mX>=hx&&mX<=hx+hw&&mY>=hy&&mY<=hy+hh;
  rRect(hx,hy,hw,hh,9);C.fillStyle=hhv?'#1a2a3a':'#0d1824';C.fill();C.strokeStyle='#1e3a5a';C.lineWidth=1;C.stroke();
  C.font='500 14px system-ui,sans-serif';C.fillStyle=hhv?'#88ccff':'#4488aa';C.fillText('HANGAR',W/2,hy+hh/2);
  if (META.hi>0){C.font='12px system-ui,sans-serif';C.fillStyle='#ffdd44';C.fillText('best: '+META.hi.toLocaleString(),W/2,hy+hh+22);}
  bR=[{x:px,y:py,w:pw,h:ph2,act:'play'},{x:hx,y:hy,w:hw,h:hh,act:'shop'}];
}

function drawPlay(t) {
  bR=[];
  drawBGPlay(t);
  if (G.flT>0){C.fillStyle=`rgba(195,18,18,${G.flT/980})`;C.fillRect(0,0,W,H);}
  drawWorldBorder();
  drawObstacles(t);
  drawParts();drawGems(t);drawBuls();drawChain();drawOrbs();
  G.ens.forEach(e=>{if(isVis(e.x,e.y,30))drawEn(e,t,wx(e.x),wy(e.y));});

  // Mining beam (под кораблём)
  drawMiningBeam(t);
  drawShip(wx(G.s.x),wy(G.s.y),G.s.ang,G.s.u,t,false);
  drawScanPulse();

  // Курсор
  C.fillStyle='rgba(255,255,255,.38)';C.beginPath();C.arc(mX,mY,2.8,0,Math.PI*2);C.fill();
  drawHPBar();

  // Wave progress
  const prog=Math.min(1,G.wT/G.wDur);
  C.fillStyle='#ffffff07';C.fillRect(20,H-7,W-40,2);
  C.fillStyle='#44aaff30';C.fillRect(20,H-7,(W-40)*prog,2);

  // Wave banner
  if (G.wBanT>0){
    C.globalAlpha=Math.min(1,G.wBanT/380)**2;C.textAlign='center';C.textBaseline='middle';
    C.font='500 27px system-ui,sans-serif';C.fillStyle='#fff';C.fillText('WAVE '+G.wave,W/2,50);
    const tips=['explore the void · use SPACE to scan','asteroids slow mining by type: ◆grey ◆orange ◆green','nebula clouds slow movement','destroy crystals for gems'];
    C.font='11px system-ui,sans-serif';C.fillStyle='#ffffff60';C.fillText(tips[(G.wave-1)%tips.length],W/2,74);
    C.globalAlpha=1;
  }

  const ship=SHIPS.find(s=>s.id===G.shipId)||SHIPS[0];
  C.textAlign='left';C.font='10px system-ui,sans-serif';C.fillStyle=ship.accent+'88';
  C.fillText(ship.passiveDesc,16,20);

  // Ore HUD
  C.fillStyle='#44ffaa';C.font='500 12px system-ui,sans-serif';
  C.fillText('◆ '+G.ore,16,36);

  drawScanUI();
  drawMinimap();

  // ESC hint (fade после 3 сек)
  if (G.wT<3000){C.globalAlpha=(3000-G.wT)/3000*0.4;C.font='10px system-ui,sans-serif';C.fillStyle='#fff';C.textAlign='center';C.fillText('ESC — pause',W/2,H-26);C.globalAlpha=1;}
}

// ─── PAUSE ─────────────────────────────────────────────
function drawPause(t) {
  // Замороженная игра под оверлеем
  drawBGPlay(t);
  drawWorldBorder();
  drawObstacles(t);
  drawParts();drawGems(t);drawBuls();drawChain();drawOrbs();
  G.ens.forEach(e=>{if(isVis(e.x,e.y,30))drawEn(e,t,wx(e.x),wy(e.y));});
  drawShip(wx(G.s.x),wy(G.s.y),G.s.ang,G.s.u,t,false);
  drawMinimap();

  // Тёмный оверлей
  C.fillStyle='rgba(3,8,16,0.78)';C.fillRect(0,0,W,H);

  C.textAlign='center';C.textBaseline='middle';
  C.font='500 34px system-ui,sans-serif';C.fillStyle='#fff';C.fillText('PAUSED',W/2,H/2-118);
  C.font='11px system-ui,sans-serif';C.fillStyle='#ffffff30';
  C.fillText('wave '+G.wave+' · score '+G.score.toLocaleString(),W/2,H/2-90);

  const buttons=[
    {label:'RESUME',     act:'resume',  col:'#1155aa', hov:'#2277cc', tc:'#fff'},
    {label:'NEW GAME',   act:'newgame', col:'#0d1824', hov:'#1a2a3a', tc:'#88ccff'},
    {label:'HANGAR',     act:'shop',    col:'#0d1824', hov:'#1a2a3a', tc:'#88ccff'},
  ];
  bR=[];
  const bw=200,bh=48;
  buttons.forEach((b,i)=>{
    const bx=W/2-bw/2, by=H/2-52+i*60;
    const hv=mX>=bx&&mX<=bx+bw&&mY>=by&&mY<=by+bh;
    rRect(bx,by,bw,bh,9);C.fillStyle=hv?b.hov:b.col;C.fill();
    C.strokeStyle='#1e3a5a';C.lineWidth=1;C.stroke();
    C.font='500 15px system-ui,sans-serif';C.fillStyle=b.tc;C.fillText(b.label,W/2,by+bh/2);
    bR.push({x:bx,y:by,w:bw,h:bh,act:b.act});
  });

  C.font='10px system-ui,sans-serif';C.fillStyle='#ffffff20';
  C.fillText('ESC to resume',W/2,H/2+136);
}

function drawUpgrade(t) {
  drawBGStatic(t);
  drawShipSprite(G.shipId||'vanguard',W/2,68,-Math.PI/2,t,G.s.u,false);
  C.textAlign='center';C.textBaseline='middle';
  C.font='500 21px system-ui,sans-serif';C.fillStyle='#fff';
  C.fillText(G.upSrc==='wavecomplete'?'WAVE '+G.wave+' CLEARED':'LEVEL UP',W/2,118);
  C.font='11px system-ui,sans-serif';C.fillStyle='#44aaff';
  C.fillText('level '+G.lvl+(G.upSrc==='wavecomplete'?' · wave cleared':''),W/2,138);
  const ch=G.choices,nc=ch.length;
  const cw=168,ch2=218,gap=9,totW=nc*cw+(nc-1)*gap,sx=W/2-totW/2,sy=155;
  bR=[];
  ch.forEach((u,i)=>{
    const lv=G.s.u[u.k],hv=hovI===i,cx2=sx+i*(cw+gap);
    rRect(cx2,sy,cw,ch2,9);C.fillStyle=hv?(u.cat==='W'?'#0c2244':'#0b3020'):(u.cat==='W'?'#06101f':'#05100e');C.fill();
    C.strokeStyle=hv?(u.cat==='W'?'#3366ee':'#22dd66'):(u.cat==='W'?'#12204e':'#112e18');C.lineWidth=hv?2:1;C.stroke();
    rRect(cx2+8,sy+8,u.cat==='W'?64:68,17,4);C.fillStyle=u.cat==='W'?'rgba(38,78,200,.38)':'rgba(18,138,55,.38)';C.fill();
    C.font='9px system-ui,sans-serif';C.fillStyle=u.cat==='W'?'#7799ff':'#44ee88';C.fillText(u.cat==='W'?'WEAPON':'PASSIVE',cx2+8+(u.cat==='W'?32:34),sy+17);
    for(let l=0;l<u.max;l++){C.fillStyle=l<lv+1?'#44aaff':'#18304a';C.beginPath();C.arc(cx2+cw/2+(l-(u.max-1)/2)*11,sy+42,4,0,Math.PI*2);C.fill();}
    C.font='500 13px system-ui,sans-serif';C.fillStyle=hv?'#eef5ff':'#aabccc';C.fillText(u.name,cx2+cw/2,sy+64);
    C.font='11px system-ui,sans-serif';C.fillStyle='#506070';C.fillText(u.desc,cx2+cw/2,sy+82);
    const eff={pulse:[`DMG: ${15+lv*9}→${15+(lv+1)*9}`,`rate +${Math.round((1-(Math.max(155,520-(lv+1)*68)/Math.max(155,520-lv*68)))*100)}%`],orbit:[`orbs: ${lv}→${lv+1}`,'rotating dmg'],chain:[`targets: ${1+lv*2}→${1+(lv+1)*2}`,`DMG: ${22+lv*14}→${22+(lv+1)*14}`],scatter:[`shots: ${3+lv*2}→${3+(lv+1)*2}`,'spread burst'],spd:[`speed +${(lv+1)*22}%`,'move faster'],armor:[`HP: ${G.s.mhp}→${G.s.mhp+25}`,'more hull'],mag:[`range: ${80+lv*32}→${80+(lv+1)*32}px`,'collect XP further'],regen:[`regen: ${['off→slow','slow→fast','fast→rapid'][lv]}`,'passive heal']}[u.k]||[''];
    eff.forEach((ef,ei)=>{if(!ef)return;C.font='11px system-ui,sans-serif';C.fillStyle=hv?'#66ccff':'#33566a';C.fillText(ef,cx2+cw/2,sy+100+ei*17);});
    const bb=sy+ch2-49;rRect(cx2+10,bb,cw-20,41,7);C.fillStyle=hv?(u.cat==='W'?'#1e44a0':'#1a6633'):(u.cat==='W'?'#0c1e38':'#0a1e14');C.fill();
    C.font='500 12px system-ui,sans-serif';C.fillStyle=hv?(u.cat==='W'?'#88aaff':'#66ff88'):(u.cat==='W'?'#33448a':'#224435');C.fillText('SELECT',cx2+cw/2,bb+21);
    bR.push({x:cx2,y:sy,w:cw,h:ch2,act:'upgrade',k:u.k});
  });
  const sk={x:W/2-68,y:sy+ch2+14,w:136,h:35};
  rRect(sk.x,sk.y,sk.w,sk.h,6);C.fillStyle=mX>=sk.x&&mX<=sk.x+sk.w&&mY>=sk.y&&mY<=sk.y+sk.h?'#0d1a2a':'#060f1a';C.fill();
  C.strokeStyle='#0d1a2a';C.lineWidth=1;C.stroke();
  C.font='11px system-ui,sans-serif';C.fillStyle='#2f4455';C.fillText('skip →',W/2,sk.y+sk.h/2);
  bR.push({...sk,act:'skip'});
}

function drawStatBar(x,y,w,val,col){C.fillStyle='#ffffff10';C.fillRect(x,y,w,4);C.fillStyle=col;C.fillRect(x,y,w*val,4);}

function drawShop(t) {
  drawBGStatic(t);
  C.textAlign='center';C.textBaseline='middle';
  C.font='500 24px system-ui,sans-serif';C.fillStyle='#fff';C.fillText('HANGAR',W/2,36);
  C.font='500 15px system-ui,sans-serif';C.fillStyle='#ffdd44';C.fillText('⬡ '+META.credits.toLocaleString(),W/2,62);
  C.fillStyle='#44ffaa';C.font='12px system-ui,sans-serif';C.fillText('◆ '+META.ore+' ore stored',W/2,80);
  bR=[];
  const cols=3,cw2=176,ch3=192,gx=8,gy=8,totalW=cols*cw2+(cols-1)*gx,sx2=(W-totalW)/2,sy=94;
  SHIPS.forEach((ship,i)=>{
    const col2=i%cols,row=Math.floor(i/cols),cx3=sx2+col2*(cw2+gx),cy=sy+row*(ch3+gy);
    const owned=META.owned.includes(ship.id),isSel=shopSel===ship.id,isAct=META.selected===ship.id;
    const hov=mX>=cx3&&mX<=cx3+cw2&&mY>=cy&&mY<=cy+ch3;
    rRect(cx3,cy,cw2,ch3,8);C.fillStyle=isSel?'#0a1e30':hov?'#081522':'#040e18';C.fill();
    C.strokeStyle=isAct?'#44aaff':isSel?'#225588':hov&&owned?'#1a3a55':'#0e1e2a';C.lineWidth=isAct?2:1;C.stroke();
    drawShipSprite(ship.id,cx3+cw2/2,cy+52,-Math.PI/2,t,{orbit:0},false);
    C.textAlign='center';C.font='500 12px system-ui,sans-serif';C.fillStyle=isAct?ship.accent:owned?'#aabbcc':'#445566';C.fillText(ship.name,cx3+cw2/2,cy+102);
    C.font='10px system-ui,sans-serif';C.fillStyle='#ffffff20';C.fillText(ship.lore,cx3+cw2/2,cy+115);
    const bx2=cx3+16,bw3=cw2-32;
    [{label:'ATK',val:ship.statAtk,col:'#ff8844'},{label:'SPD',val:ship.statSpd,col:'#44ff88'},{label:'DEF',val:ship.statDef,col:'#44aaff'}].forEach((b,bi)=>{C.font='9px system-ui,sans-serif';C.fillStyle='#ffffff35';C.textAlign='left';C.fillText(b.label,bx2,cy+128+bi*13);drawStatBar(bx2+24,cy+124+bi*13,bw3-24,b.val,b.col);});
    C.textAlign='center';C.font='9px system-ui,sans-serif';C.fillStyle=owned?ship.accent+'88':'#223344';C.fillText(ship.passiveDesc,cx3+cw2/2,cy+168);
    const btnY=cy+ch3-30,btnH=24;rRect(cx3+10,btnY,cw2-20,btnH,5);
    let btnCol,btnTxt;
    if(isAct){btnCol='#0d2a40';btnTxt='ACTIVE';}
    else if(owned){const bHov=mX>=cx3+10&&mX<=cx3+cw2-10&&mY>=btnY&&mY<=btnY+btnH;btnCol=bHov?'#1155aa':'#0a2040';btnTxt='SELECT';}
    else{const canBuy=META.credits>=ship.cost,bHov=mX>=cx3+10&&mX<=cx3+cw2-10&&mY>=btnY&&mY<=btnY+btnH&&canBuy;btnCol=canBuy?(bHov?'#1a5522':'#0d3316'):'#0c1510';btnTxt=canBuy?('⬡ '+ship.cost):'⬡ '+ship.cost;}
    C.fillStyle=btnCol;C.fill();C.font='500 10px system-ui,sans-serif';
    C.fillStyle=isAct?'#44aaff':owned?'#66bbee':META.credits>=ship.cost?'#44ee66':'#2a5533';C.fillText(btnTxt,cx3+cw2/2,btnY+btnH/2);
    bR.push({x:cx3,y:cy,w:cw2,h:ch3,act:owned?'select':'buy',id:ship.id,cost:ship.cost});
  });
  // Back button
  const bb=drawBackBtn(t);bR.push(bb);
}

function drawOver(t) {
  drawBGStatic(t);
  C.textAlign='center';C.textBaseline='middle';
  C.font='500 28px system-ui,sans-serif';C.fillStyle='#ee3344';C.fillText('HULL DESTROYED',W/2,H/2-140);
  C.font='500 60px system-ui,sans-serif';C.fillStyle='#fff';C.fillText(G.score.toLocaleString(),W/2,H/2-85);
  C.font='13px system-ui,sans-serif';C.fillStyle='#ffffff44';C.fillText('wave '+G.wave+' · level '+G.lvl,W/2,H/2-44);
  // Ore summary
  if (G.ore>0){
    C.font='500 13px system-ui,sans-serif';C.fillStyle='#44ffaa';C.fillText('◆ '+G.ore+' ore collected',W/2,H/2-22);
  }
  if (G.earnedCredits>0){
    C.font='500 14px system-ui,sans-serif';C.fillStyle='#ffdd44';C.fillText('+⬡ '+G.earnedCredits+' earned',W/2,H/2+2);
    C.font='11px system-ui,sans-serif';C.fillStyle='#ffdd4466';C.fillText('total: ⬡ '+META.credits.toLocaleString(),W/2,H/2+20);
  }
  if (G.score>0&&G.score>=META.hi){C.font='500 13px system-ui,sans-serif';C.fillStyle='#ffdd44';C.fillText('new best!',W/2,H/2+40);}
  const bw=185,bh=52,bx=W/2-bw/2,by=H/2+60;
  const hv=mX>=bx&&mX<=bx+bw&&mY>=by&&mY<=by+bh;
  rRect(bx,by,bw,bh,9);C.fillStyle=hv?'#2277cc':'#1155aa';C.fill();
  C.font='500 16px system-ui,sans-serif';C.fillStyle='#fff';C.fillText('PLAY AGAIN',W/2,by+bh/2);
  const hx=W/2-88,hy=by+bh+12,hw=176,hh=36;
  const hhv=mX>=hx&&mX<=hx+hw&&mY>=hy&&mY<=hy+hh;
  rRect(hx,hy,hw,hh,8);C.fillStyle=hhv?'#1a2a3a':'#0a1420';C.fill();C.strokeStyle='#1e3a5a';C.lineWidth=1;C.stroke();
  C.font='500 13px system-ui,sans-serif';C.fillStyle=hhv?'#88ccff':'#4488aa';C.fillText('HANGAR',W/2,hy+hh/2);
  bR=[{x:bx,y:by,w:bw,h:bh,act:'play'},{x:hx,y:hy,w:hw,h:hh,act:'shop'}];
}

// ═══════════════════════════════════════════════════════
//  GAME LOOP
// ═══════════════════════════════════════════════════════

function draw(ts) {
  C.save();
  if (G.shT>0)C.translate(G.shX,G.shY);
  if      (G.ph==='menu')    drawMenu(ts);
  else if (G.ph==='play')    drawPlay(ts);
  else if (G.ph==='pause')   drawPause(ts);
  else if (G.ph==='upgrade') drawUpgrade(ts);
  else if (G.ph==='shop')    drawShop(ts);
  else                       drawOver(ts);
  C.restore();
}

function loop(ts) {
  const dt=Math.min(ts-ts0,60);ts0=ts;
  update(dt);draw(ts);
  requestAnimationFrame(loop);
}

// ═══════════════════════════════════════════════════════
//  ВВОД
// ═══════════════════════════════════════════════════════

function startGame() {
  G=mkG();G.wave=1;spawnWave(1);G.wBanT=2400;G.ph='play';updHUD();
}

function goBack() {
  if      (G.ph==='pause') G.ph='play';
  else if (G.ph==='shop')  G.ph=G.shopFrom==='pause'?'pause':'menu';
  else if (G.ph==='menu')  {} // нечего делать
}

function click(x,y) {
  for (const b of bR) {
    if (x>=b.x&&x<=b.x+b.w&&y>=b.y&&y<=b.y+b.h) {
      if      (b.act==='play')    startGame();
      else if (b.act==='shop')    { G.shopFrom=G.ph; shopSel=META.selected; G.ph='shop'; bR=[]; }
      else if (b.act==='back')    goBack();
      else if (b.act==='resume')  G.ph='play';
      else if (b.act==='newgame') startGame();
      else if (b.act==='select')  { META.selected=b.id;shopSel=b.id;saveMeta(); }
      else if (b.act==='buy') {
        if (META.credits>=b.cost&&!META.owned.includes(b.id)) {
          META.credits-=b.cost;META.owned.push(b.id);META.selected=b.id;shopSel=b.id;saveMeta();
        }
      }
      else if (b.act==='upgrade') { applyUpg(b.k);updHUD(); }
      else if (b.act==='skip') {
        if (G.upSrc==='wavecomplete'){G.wave++;spawnWave(G.wave);G.wBanT=2400;}
        G.ph='play';updHUD();
      }
      else if (b.act==='scan')    doScan();
      return;
    }
  }
}

function cvXY(e) {
  const r=CV.getBoundingClientRect(),s=W/r.width;
  return[(e.clientX-r.left)*s,(e.clientY-r.top)*s];
}

CV.addEventListener('mousemove',e=>{
  [mX,mY]=cvXY(e);
  if (G.ph==='upgrade'){hovI=-1;bR.forEach((b,i)=>{if(b.act==='upgrade'&&mX>=b.x&&mX<=b.x+b.w&&mY>=b.y&&mY<=b.y+b.h)hovI=i;});}
});
CV.addEventListener('click',e=>{const[x,y]=cvXY(e);click(x,y);});
CV.addEventListener('touchstart',e=>{e.preventDefault();[mX,mY]=cvXY(e.touches[0]);click(mX,mY);},{passive:false});
CV.addEventListener('touchmove',e=>{
  e.preventDefault();[mX,mY]=cvXY(e.touches[0]);
  if(G.ph==='upgrade'){hovI=-1;bR.forEach((b,i)=>{if(b.act==='upgrade'&&mX>=b.x&&mX<=b.x+b.w&&mY>=b.y&&mY<=b.y+b.h)hovI=i;});}
},{passive:false});

// ── Клавиатура ─────────────────────────────────────────
document.addEventListener('keydown',e=>{
  if (e.key==='Escape'||e.key==='Esc') {
    if      (G.ph==='play')  G.ph='pause';
    else if (G.ph==='pause') G.ph='play';
    else if (G.ph==='shop')  goBack();
  }
  if ((e.key===' '||e.code==='Space')&&G.ph==='play') {
    e.preventDefault();
    doScan();
  }
});

function updHUD() {
  document.getElementById('sv').textContent=G.score.toLocaleString();
  document.getElementById('wv').textContent=(G.ph==='menu'||G.ph==='shop')?'—':G.wave;
  document.getElementById('lv').textContent=(G.ph==='menu'||G.ph==='shop')?'—':G.lvl;
  document.getElementById('orv').textContent=(G.ph==='menu'||G.ph==='shop')?META.ore:G.ore;
  document.getElementById('xpf').style.width=(G.xpMax>0?G.xp/G.xpMax*100:0)+'%';
}

G=mkG();updHUD();
requestAnimationFrame(ts=>{ts0=ts;loop(ts);});
</script>
