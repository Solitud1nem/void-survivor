<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Void Survivor</title>
<meta name="base:app_id" content="69dcdacd2c63bda05673178a">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #030810;
    display: flex; flex-direction: column; align-items: center;
    justify-content: flex-start; min-height: 100vh;
    min-height: 100dvh;
    padding: 12px 0; font-family: system-ui, -apple-system, sans-serif;
    padding: env(safe-area-inset-top, 12px) env(safe-area-inset-right, 0) env(safe-area-inset-bottom, 0) env(safe-area-inset-left, 0);
    color: #fff; gap: 6px;
    overflow: hidden;
  }
  #hb { width:100%; max-width:960px; display:flex; justify-content:space-between; padding:0 4px; }
  .hl { font-size:11px; color:#ffffff55; }
  .hv { font-size:19px; font-weight:500; line-height:1.1; }
  #xpb { width:100%; max-width:960px; height:3px; background:#ffffff15; border-radius:2px; }
  #xpf { height:3px; border-radius:2px; background:#44ff88; transition:width .12s; }
  #cv  { display:block; max-width:960px; max-height:calc(100dvh - 50px); cursor:default; touch-action:none; border-radius:8px; width:min(100%, calc((100dvh - 50px) * 960 / 540)); }
  #game { display:flex; flex-direction:column; align-items:center; gap:6px; width:100%; }
  #game:fullscreen { background:#030810; justify-content:center; padding:0; }
  #game:fullscreen #cv { max-width:none; width:100vw; height:calc(100vh - 40px); border-radius:0; object-fit:contain; }
  #game:fullscreen #hb { max-width:100vw; }
  #game:fullscreen #xpb { max-width:100vw; }
</style>
</head>
<body>
<div id="game">
  <div id="hb">
    <div><div class="hl">score</div><div class="hv" id="sv">—</div></div>
    <div style="text-align:center"><div class="hl">level</div><div class="hv" id="wv">—</div></div>
    <div style="text-align:right; display:flex; gap:16px; align-items:flex-end">
      <div><div class="hl">level</div><div class="hv" id="lv">—</div></div>
      <div><div class="hl">ore</div><div class="hv" id="orv" style="color:#44ffaa">—</div></div>
    </div>
  </div>
  <div id="xpb"><div id="xpf" style="width:0"></div></div>
  <canvas id="cv" width="960" height="540"></canvas>
</div>

<script type="module" src="/src/main.js"></script>
</body>
</html>
